<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Add Book</title>
		<link rel="stylesheet" href="/main.css" />
		<link rel="manifest" href="/manifest.json" />
	</head>
	<body>
		<nav class="navbar" role="navigation" aria-label="Main navigation">
			<div class="nav-left">
				<a href="/homePage.html" aria-label="Go to home page">
					<svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
						<path d="M3 10L12 3L21 10V20H3V10Z" />
					</svg>
				</a>
			</div>

			<div class="nav-right">
				<label for="lang-switch" class="sr-only">Language</label>
				<select id="lang-switch" aria-label="Select language" name="language">
					<option value="en">EN</option>
					<option value="no">NO</option>
				</select>

				<a href="/userPage.html" aria-label="Go to user page">
					<svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
						<path
							d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"
						/>
					</svg>
				</a>

				<button
					class="btn logout"
					type="button"
					aria-label="Log out of account"
				></button>
			</div>
		</nav>

		<main class="container" role="main">
			<div class="card form-card">
				<h1 data-i18n="addBook"></h1>

				<form class="form" aria-label="Add book form">
					<label for="title" class="sr-only">Title</label>
					<input
						id="title"
						name="title"
						data-i18n-placeholder="title"
						required
					/>

					<label for="author" class="sr-only">Author</label>
					<input
						id="author"
						name="author"
						data-i18n-placeholder="author"
						required
					/>

					<label for="status" class="sr-only">Book status</label>
					<select id="status" name="status" aria-label="Book status">
						<option value="unread">Unread</option>
						<option value="reading">Reading</option>
						<option value="finished">Finished</option>
					</select>

					<button
						class="btn add-btn"
						data-i18n="addBook"
						type="submit"
					></button>
				</form>
			</div>
		</main>

		<script type="module" src="/app.mjs"></script>
	</body>
</html>
