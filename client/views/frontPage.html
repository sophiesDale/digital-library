<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Welcome</title>
		<link rel="stylesheet" href="/main.css" />
		<link rel="manifest" href="/manifest.json" />
	</head>
	<body>
		<nav class="navbar" role="navigation" aria-label="Main navigation">
			<div class="nav-right">
				<label for="lang-switch" class="sr-only">Language</label>
				<select id="lang-switch" aria-label="Select language" name="language">
					<option value="en">EN</option>
					<option value="no">NO</option>
				</select>
			</div>
		</nav>

		<main class="center" role="main">
			<div class="card front-card">
				<div class="front-buttons">
					<a
						href="/loginPage.html"
						class="big-btn"
						data-i18n="login"
						aria-label="Go to Log In page"
					></a>
					<a
						href="/createUser.html"
						class="big-btn outline"
						data-i18n="createAccount"
						aria-label="Go to create account page"
					></a>
				</div>
			</div>
		</main>

		<script type="module" src="/app.mjs"></script>
	</body>
</html>
